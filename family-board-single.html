<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Family Achievement Board - Full Code</title>
  <style>
    /* CSS will be inserted here */
  </style>
</head>
<body>
  <h1>Family Achievement Board - Complete Code</h1>
  <p>This file contains the entire app (HTML, CSS, JavaScript) for AI review.</p>
  
  <h2>HTML Structure</h2>
  <pre><code id="html-code"></code></pre>
  
  <h2>CSS</h2>
  <pre><code id="css-code"></code></pre>
  
  <h2>JavaScript</h2>
  <pre><code id="js-code"></code></pre>

  <script>
    // Load the actual files
    async function load() {
      const files = {
        html: 'index.html',
        css: 'style.css', 
        js: 'app.js'
      };
      
      for (const [type, file] of Object.entries(files)) {
        try {
          const response = await fetch(file);
          const text = await response.text();
          document.getElementById(`${type}-code`).textContent = text;
        } catch (e) {
          document.getElementById(`${type}-code`).textContent = `Error loading ${file}: ${e}`;
        }
      }
    }
    
    load();
  </script>
</body>
</html>
