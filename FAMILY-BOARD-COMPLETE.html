<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0d0d14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FamBoard" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />
  <title>Family Achievement Board</title>
<style>
<body>
  <div class="wrap" id="appRoot">
    <header>
      <h1>🏆 <span class="brand">Family Achievement Board</span></h1>
      <div class="row">
        <div class="clock" id="clock"></div>
        <button id="displayToggle">Display Mode</button>
        <button id="settingsBtn">Settings</button>
      </div>
    </header>

    <section class="grid">
      <!-- Weekly Payout Card -->
      <article class="card kpi">
        <h2>Weekly Payout</h2>
        <div class="money" id="payoutVal">$0.00</div>
        <div class="small muted">Formula: base + approved×rate + gradeBonus − penalties</div>
        <div class="row">
          <span class="small">Approved <b id="approvedCount">0</b></span>
          <span class="small">Pending <b id="pendingCount">0</b></span>
          <span class="small">Rejected <b id="rejectedCount">0</b></span>
        </div>
        <div class="small" id="payoutBreakdown"></div>
      </article>

      <!-- Chores Card -->
      <article class="card chores">
        <h2>Chores</h2>
        <div class="row interactive">
          <input id="choreName" placeholder="Add chore (e.g., Clean room)" />
          <input id="chorePts" type="number" min="1" max="50" value="5" style="width:90px" placeholder="Points" />
          <select id="choreKid">
            <option value="kid1">Kid 1</option>
            <option value="kid2">Kid 2</option>
            <option value="shared">Shared</option>
          </select>
          <button id="addChore">Add</button>
        </div>
        <div class="row small muted" style="margin-top:8px">
          <span>Filter:</span>
          <button data-filter="all" class="active">All</button>
          <button data-filter="pending">Pending</button>
          <button data-filter="approved">Approved</button>
          <button data-filter="kid1">Kid 1</button>
          <button data-filter="kid2">Kid 2</button>
        </div>
        <div id="choreList" style="margin-top:12px"></div>
      </article>

      <!-- Controls Card -->
      <article class="card controls interactive">
        <h2>Week Control</h2>
        <div class="small">Week Key: <span id="weekKey"></span></div>
        <div class="small muted" id="weekProgress"></div>
        <button id="newWeekBtn" style="margin-top:8px">Start New Week</button>
        <button id="openGradeBtn" style="margin-top:8px">Grade Modal</button>
        <button id="openCalcBtn" style="margin-top:8px">Calculator</button>
        <div style="margin-top:12px;padding-top:12px;border-top:1px solid #2d3046">
          <div class="small">PIN Gate:</div>
          <input id="pinInput" type="password" placeholder="0000" maxlength="4" style="width:80px;text-align:center" />
          <button id="pinBtn" class="small">Unlock</button>
        </div>
      </article>

      <!-- Grades Card -->
      <article class="card grades">
        <h2>Grades</h2>
        <div id="gradeSummary"></div>
        <div class="row" style="margin-top:12px">
          <button class="interactive" id="calcBtn">Kid1 Calculator</button>
          <button class="interactive" id="sparklineBtn">Toggle Sparkline</button>
        </div>
        <svg id="miniSpark" style="width:100%;height:60px;margin-top:12px;display:none"></svg>
      </article>

      <!-- Activity Log Card -->
      <article class="card log">
        <h2>Activity Log</h2>
        <div id="activity"></div>
        <div class="row" style="margin-top:12px">
          <button class="small" id="clearLogBtn">Clear Old Logs</button>
          <button class="small" id="exportLogBtn">Export Logs</button>
        </div>
      </article>
    </section>
  </div>

  <!-- Grade Modal -->
  <dialog id="gradeModal">
    <h3>Set Weekly Grades</h3>
    <div id="gradeRows"></div>
    <div class="row" style="justify-content:flex-end;margin-top:16px">
      <button id="gradeCancel">Cancel</button>
      <button id="gradeSave">Save Grades</button>
    </div>
  </dialog>

  <!-- Settings Modal -->
  <dialog id="settingsModal">
    <h3>Settings & Data</h3>
    
    <div class="setup-section" style="margin-bottom: 16px;">
      <h4>Parent PIN Management</h4>
      <div class="row">
        <label style="flex:1">
          Current PIN
          <input id="currentPin" type="password" placeholder="Current PIN" style="width:100%" maxlength="4" />
        </label>
        <label style="flex:1">
          New PIN (leave empty to remove)
          <input id="newPin" type="password" placeholder="New PIN (4 digits)" style="width:100%" maxlength="4" />
        </label>
      </div>
      <div class="row" style="justify-content:flex-end;margin-top:8px">
        <button id="updatePinBtn" class="small">Update PIN</button>
      </div>
      <div class="small muted" id="pinStatus" style="margin-top:8px"></div>
    </div>
    
    <div class="row" style="margin:8px 0">
      <label style="flex:1">
        Passphrase
        <input id="passphrase" type="password" placeholder="Required for export/import" style="width:100%" />
      </label>
    </div>
    <div class="row" style="margin:12px 0;gap:8px">
      <button id="exportBtn">Export Encrypted</button>
      <button id="importBtn">Import Encrypted</button>
      <button id="clearBtn">Clear Data</button>
      <button id="resetAppBtn" style="background:var(--danger);color:white">Reset App</button>
    </div>
    <textarea id="blobArea" placeholder="Encrypted payload appears here..."></textarea>
    <div class="row" style="margin-top:12px">
      <div class="small muted" style="flex:1">Data size: <span id="dataSize">0 KB</span></div>
      <button id="settingsClose">Close</button>
    </div>
  </dialog>

  <!-- Calculator Drawer -->
  <aside class="drawer" id="calcDrawer">
    <div class="row" style="justify-content:space-between;align-items:center">
      <h3>Kid1 Weighted Grade Calculator</h3>
      <button id="closeCalcBtn">×</button>
    </div>
    <div id="calcRows"></div>
    <div class="row" style="margin-top:16px;justify-content:space-between">
      <div>
        <div class="small muted">Current Weighted Grade:</div>
        <div style="font-size:1.5rem;font-weight:bold;color:var(--cyan)" id="weightedOut">0%</div>
      </div>
      <div>
        <div class="small muted">Letter Grade:</div>
        <div style="font-size:1.5rem;font-weight:bold" id="letterGrade">-</div>
      </div>
    </div>
    <div class="row" style="margin-top:12px">
      <input id="newScore" type="number" min="0" max="100" placeholder="Add score" style="flex:1" />
      <select id="scoreCategory">
        <option value="Homework">Homework</option>
        <option value="Quizzes">Quizzes</option>
        <option value="Tests">Tests</option>
        <option value="Participation">Participation</option>
      </select>
      <button id="addScoreBtn">Add</button>
    </div>
    <svg id="spark" class="spark" viewBox="0 0 340 110"></svg>
  </aside>

  <!-- PIN Gate Modal -->
  <dialog id="pinModal">
    <h3>Parent PIN Required</h3>
    <p class="small muted">Enter parent PIN to approve/reject chores</p>
    <input id="parentPin" type="password" maxlength="4" style="width:120px;font-size:1.5rem;text-align:center;letter-spacing:8px" />
    <div class="row" style="justify-content:flex-end;margin-top:16px">
      <button id="pinCancel">Cancel</button>
      <button id="pinSubmit">Submit</button>
    </div>
  </dialog>

  <!-- First-Time Setup Modal -->
  <dialog id="setupModal">
    <h3>🏆 Welcome to Family Achievement Board!</h3>
    <p class="small muted">Let's set up your family's achievement system.</p>
    
    <div class="setup-form">
      <div class="setup-section">
        <h4>Kid 1</h4>
        <div class="row">
          <input id="setupKid1Name" placeholder="Name (e.g., Sofi)" style="flex:1" />
          <input id="setupKid1Emoji" placeholder="Emoji (e.g., 👧)" style="width:80px;text-align:center" maxlength="2" />
        </div>
      </div>
      
      <div class="setup-section">
        <h4>Kid 2</h4>
        <div class="row">
          <input id="setupKid2Name" placeholder="Name (e.g., Juli)" style="flex:1" />
          <input id="setupKid2Emoji" placeholder="Emoji (e.g., 👩)" style="width:80px;text-align:center" maxlength="2" />
        </div>
      </div>
      
      <div class="setup-section">
        <h4>Weekly Goals</h4>
        <div class="row">
          <label style="flex:1">
            Weekly Goal Points
            <input id="setupWeeklyPoints" type="number" min="10" max="100" value="50" style="width:100%" />
          </label>
          <label style="flex:1">
            Max Payout ($)
            <input id="setupMaxPayout" type="number" min="10" max="100" value="50" style="width:100%" />
          </label>
        </div>
      </div>
      
      <div class="setup-section">
        <h4>Parent PIN (Optional)</h4>
        <p class="small muted">Leave empty for no PIN protection</p>
        <input id="setupParentPin" type="password" maxlength="4" placeholder="0000" style="width:120px;font-size:1.2rem;text-align:center;letter-spacing:6px" />
      </div>
    </div>
    
    <div class="row" style="justify-content:flex-end;margin-top:24px;gap:8px">
      <button id="setupCancel" class="secondary">Skip & Use Defaults</button>
      <button id="setupSave">Save & Start</button>
    </div>
  </dialog>

  <script src="./app.js"></script>
</body>
</html>/* Family Achievement Board - Complete CSS */
:root {
  /* Core design tokens */
  --bg: #0d0d14;
  --card: #161623;
  --panel: #1f2131;
  --txt: #f5f7ff;
  --muted: #9ca3b8;
  
  /* Kid colors */
  --k1: #ff4d6d;
  --k2: #2be9ff;
  --k3: #f3c969;
  --k4: #8fff8f;
  
  /* Status colors */
  --ok: #3de18f;
  --warn: #ffbf4d;
  --danger: #ff667f;
  --cyan: #2be9ff;
  --gold: #f3c969;
  --red: #ff4d6d;
  
  /* UI */
  --radius: 16px;
  --shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
  --border: 1px solid #26283c;
  --border-light: 1px solid #343852;
  
  /* Animations */
  --glow-duration: 2s;
  --scanline-duration: 3s;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: linear-gradient(180deg, var(--bg), #121423);
  color: var(--txt);
  font-family: 'DM Sans', system-ui, sans-serif;
  min-height: 100vh;
  transition: background 0.3s;
}

.wrap {
  max-width: 1200px;
  margin: 0 auto;
  padding: 16px;
}

/* Header */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: var(--border-light);
}

h1 {
  margin: 0;
  font: 700 1.6rem 'Righteous', cursive;
  letter-spacing: 0.5px;
}

.brand {
  background: linear-gradient(90deg, var(--k1), var(--k2));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.clock {
  font-size: 0.9rem;
  color: var(--muted);
  font-variant-numeric: tabular-nums;
}

/* Grid system */
.grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 12px;
  margin-top: 12px;
}

.card {
  background: var(--card);
  border: var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 16px;
  transition: transform 0.2s, box-shadow 0.2s;
}

.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
}

.card h2 {
  margin: 0 0 12px;
  font-size: 1rem;
  color: var(--txt);
  font-weight: 600;
}

/* Grid column spans */
.kpi { grid-column: span 3; }
.chores { grid-column: span 7; }
.controls { grid-column: span 2; }
.grades { grid-column: span 6; }
.log { grid-column: span 6; }

@media (max-width: 960px) {
  .kpi, .chores, .controls, .grades, .log {
    grid-column: 1 / -1;
  }
}

/* Buttons and inputs */
button, input, select {
  background: var(--panel);
  color: var(--txt);
  border: var(--border-light);
  border-radius: 10px;
  padding: 8px 12px;
  font-family: inherit;
  font-size: 0.9rem;
  transition: all 0.2s;
}

button {
  cursor: pointer;
  font-weight: 500;
}

button:hover:not(:disabled) {
  filter: brightness(1.08);
  transform: translateY(-1px);
}

button:active:not(:disabled) {
  transform: translateY(0);
}

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

input:focus, select:focus, button:focus {
  outline: 2px solid var(--cyan);
  outline-offset: 2px;
}

/* Utility classes */
.row {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}

.muted {
  color: var(--muted);
}

.small {
  font-size: 0.8rem;
}

.pill {
  padding: 4px 8px;
  border-radius: 999px;
  font-size: 0.78rem;
  border: 1px solid #344;
  background: rgba(255, 255, 255, 0.05);
}

/* Chore list */
.todo {
  display: grid;
  grid-template-columns: auto 1fr auto auto auto;
  gap: 8px;
  align-items: center;
  padding: 10px;
  border-radius: 12px;
  background: #151728;
  border: 1px solid #27293d;
  margin-bottom: 8px;
  transition: all 0.2s;
}

.todo.pin {
  outline: 2px solid var(--gold);
  background: #1a1d30;
}

.todo:hover {
  background: #1a1d30;
  border-color: #343852;
}

/* Status indicators */
.stat-pending { color: var(--warn); }
.stat-approved { color: var(--ok); }
.stat-rejected { color: var(--danger); }

/* Money display */
.money {
  font-size: 1.35rem;
  font-weight: 700;
  color: var(--gold);
}

/* Dialogs */
dialog {
  border: var(--border-light);
  border-radius: 14px;
  background: var(--card);
  color: var(--txt);
  max-width: 640px;
  width: 90%;
  padding: 20px;
}

dialog::backdrop {
  background: rgba(0, 0, 0, 0.65);
  backdrop-filter: blur(4px);
}

textarea {
  width: 100%;
  min-height: 120px;
  background: var(--panel);
  color: var(--txt);
  border: var(--border-light);
  border-radius: 10px;
  padding: 12px;
  font-family: inherit;
  resize: vertical;
}

/* Drawer */
.drawer {
  position: fixed;
  right: 0;
  top: 0;
  height: 100%;
  width: min(460px, 100%);
  background: #101220;
  border-left: 1px solid #2a2d41;
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  padding: 20px;
  overflow: auto;
  z-index: 1000;
  box-shadow: -10px 0 40px rgba(0, 0, 0, 0.5);
}

.drawer.open {
  transform: translateX(0);
}

/* Sparkline */
.spark {
  width: 100%;
  height: 110px;
  background: #17192a;
  border-radius: 12px;
  margin-top: 12px;
}

/* Display mode */
.hide-cursor {
  cursor: none !important;
}

.display-mode .interactive {
  pointer-events: none;
  opacity: 0.8;
}

.display-mode .card {
  animation: subtle-glow var(--glow-duration) ease-in-out infinite alternate;
}

/* Animations */
@keyframes fall {
  to {
    transform: translateY(110vh) rotate(550deg);
    opacity: 0.2;
  }
}

@keyframes subtle-glow {
  from {
    box-shadow: var(--shadow), 0 0 20px rgba(43, 233, 255, 0.1);
  }
  to {
    box-shadow: var(--shadow), 0 0 30px rgba(43, 233, 255, 0.2);
  }
}

@keyframes scanline {
  0% {
    transform: translateY(-100%);
  }
  100% {
    transform: translateY(100vh);
  }
}

@keyframes border-glow {
  0%, 100% {
    border-color: #26283c;
    box-shadow: 0 0 10px rgba(43, 233, 255, 0);
  }
  50% {
    border-color: var(--cyan);
    box-shadow: 0 0 20px rgba(43, 233, 255, 0.3);
  }
}

/* Confetti */
.confetti {
  position: fixed;
  top: -10px;
  width: 8px;
  height: 14px;
  animation: fall 2.4s linear forwards;
  z-index: 999;
  pointer-events: none;
}

/* Scanline effect */
.scanline {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(to right, transparent, var(--cyan), transparent);
  z-index: 998;
  pointer-events: none;
  animation: scanline var(--scanline-duration) linear infinite;
}

/* Glowing border for important items */
.glow-border {
  animation: border-glow var(--glow-duration) ease-in-out infinite;
}

/* Kid-specific styling */
.kid1 { border-left: 3px solid var(--k1); }
.kid2 { border-left: 3px solid var(--k2); }
.kid3 { border-left: 3px solid var(--k3); }
.kid4 { border-left: 3px solid var(--k4); }

/* Grade colors */
.grade-a { color: var(--ok); }
.grade-b { color: var(--cyan); }
.grade-c { color: var(--warn); }
.grade-d { color: #ff8c42; }
.grade-f { color: var(--danger); }

/* Responsive adjustments */
@media (max-width: 768px) {
  .wrap {
    padding: 12px;
  }
  
  .todo {
    grid-template-columns: 1fr;
    gap: 6px;
  }
  
  .todo > * {
    width: 100%;
  }
  
  button, input, select {
    padding: 10px;
    font-size: 1rem;
  }
}

/* Print styles */
@media print {
  .display-mode, .drawer, dialog,
  button:not(#printBtn), #displayToggle,
  #settingsBtn, #calcBtn {
    display: none !important;
  }
  
  .card {
    break-inside: avoid;
    box-shadow: none;
    border: 1px solid #ccc;
  }
}

/* Setup Modal Styles */
.setup-form {
  margin: 20px 0;
}

.setup-section {
  margin-bottom: 24px;
  padding: 16px;
  background: var(--panel);
  border-radius: var(--radius);
  border: var(--border);
}

.setup-section h4 {
  margin: 0 0 12px 0;
  color: var(--cyan);
  font-size: 1.1rem;
}

.setup-section .row {
  gap: 12px;
  margin-bottom: 8px;
}

.setup-section label {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.setup-section label .small {
  font-size: 0.85rem;
  color: var(--muted);
}

button.secondary {
  background: var(--panel);
  color: var(--muted);
  border: var(--border);
}

button.secondary:hover {
  background: #2a2c3f;
  color: var(--txt);
}

#setupModal {
  max-width: 500px;
  width: 90%;
  background: var(--card);
  border: var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}

#setupModal::backdrop {
  background: rgba(13, 13, 20, 0.9);
  backdrop-filter: blur(4px);
}// Family Achievement Board - Complete JavaScript
const STORAGE_KEY = 'famboard-v1';
const WEEK_MS = 7 * 24 * 60 * 60 * 1000;
const PARENT_PIN = '1234'; // Default PIN - should be configurable
const AUTO_APPROVE_HOURS = 48;

const now = () => Date.now();
const uid = () => crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2);
const formatMoney = (amount) => `$${amount.toFixed(2)}`;
const formatDate = (ts) => new Date(ts).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });

// SYNC POINT: Default state structure
const stateDefault = () => ({
  version: 1,
  weekStart: getWeekStart(),
  config: {
    base: 20,
    rate: 2.5,
    penalty: 1,
    gradeScale: { A: 10, B: 7, C: 4, D: 1, F: 0 },
    parentPin: PARENT_PIN,
    autoApproveHours: AUTO_APPROVE_HOURS
  },
  kids: [
    {
      id: 'kid1',
      name: 'Kid 1',
      emoji: '👧',
      grade: 'B',
      gradeHistory: [],
      calc: {
        Homework: { weight: 30, scores: [] },
        Quizzes: { weight: 20, scores: [] },
        Tests: { weight: 35, scores: [] },
        Participation: { weight: 15, scores: [] }
      }
    },
    {
      id: 'kid2',
      name: 'Kid 2',
      emoji: '👩',
      grade: 'B',
      gradeHistory: []
    }
  ],
  chores: [],
  logs: [],
  lastExport: null,
  displayMode: false
});

function getWeekStart(ts = now()) {
  const d = new Date(ts);
  const day = (d.getDay() + 6) % 7; // Monday as week start
  d.setHours(0, 0, 0, 0);
  d.setDate(d.getDate() - day);
  return d.getTime();
}

// SYNC POINT: load from localStorage
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return stateDefault();
    const saved = JSON.parse(raw);
    // Merge with defaults for any new properties
    return { ...stateDefault(), ...saved };
  } catch (e) {
    console.error('Load error:', e);
    return stateDefault();
  }
}

// SYNC POINT: save to localStorage
function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    updateDataSize();
  } catch (e) {
    console.error('Save error:', e);
  }
}

let state = load();
let currentFilter = 'all';
let pendingPinAction = null;

// Initialize
function init() {
  // Check if this is first-time setup (no saved data or default names)
  const raw = localStorage.getItem(STORAGE_KEY);
  const isFirstTime = !raw || (raw && JSON.parse(raw).kids?.[0]?.name === 'Kid 1');
  
  weekGuard();
  setupEventListeners();
  
  if (isFirstTime) {
    showSetupModal();
  } else {
    render();
    startClock();
    setupServiceWorker();
  }
}

// Show first-time setup modal
function showSetupModal() {
  const modal = document.getElementById('setupModal');
  if (!modal) return;
  
  // Set default values

// Handle setup form submission
function handleSetupSubmit() {
  const kid1Name = document.getElementById('setupKid1Name').value.trim() || 'Kid 1';
  const kid1Emoji = document.getElementById('setupKid1Emoji').value.trim() || '👧';
  const kid2Name = document.getElementById('setupKid2Name').value.trim() || 'Kid 2';
  const kid2Emoji = document.getElementById('setupKid2Emoji').value.trim() || '👩';
  const weeklyPoints = parseInt(document.getElementById('setupWeeklyPoints').value) || 50;
  const maxPayout = parseInt(document.getElementById('setupMaxPayout').value) || 50;
  const parentPin = document.getElementById('setupParentPin').value.trim();
  
  // Update state with user settings
  state.kids[0].name = kid1Name;
  state.kids[0].emoji = kid1Emoji;
  state.kids[1].name = kid2Name;
  state.kids[1].emoji = kid2Emoji;
  
  // Update config
  state.config.base = Math.min(maxPayout, 50); // Base payout
  state.config.rate = maxPayout / weeklyPoints; // Rate per point
  state.config.parentPin = parentPin || '1234'; // Default PIN if empty
  
  // Save and close
  save();
  
  const modal = document.getElementById('setupModal');
  if (modal) modal.close();
  
  // Start the app
  render();
  startClock();
  setupServiceWorker();
  
  // Add log entry
  addLog(`First-time setup completed: ${kid1Name} ${kid1Emoji} & ${kid2Name} ${kid2Emoji}`);
}

// Handle setup skip
function handleSetupSkip() {
  const modal = document.getElementById('setupModal');
  if (modal) modal.close();
  
  // Use defaults
  render();
  startClock();
  setupServiceWorker();
  
  addLog('First-time setup skipped, using defaults');
}

// Week guard - auto-reset on new week
function weekGuard() {
  const current = getWeekStart();
  if (state.weekStart !== current) {
    const oldWeek = formatDate(state.weekStart);
    state.weekStart = current;
    state.chores = state.chores.filter(c => c.recurring);
    state.logs.unshift(`${new Date().toLocaleString()}: Auto-reset for new week (was ${oldWeek})`);
    save();
  }
}

// Auto-approve chores after 48 hours
function autoApprove48h() {
  const cut = now() - (state.config.autoApproveHours * 60 * 60 * 1000);
  let changed = false;
  
  state.chores.forEach(c => {
    if (c.status === 'pending' && c.completedAt && c.completedAt <= cut) {
      c.status = 'approved';
      c.autoApproved = true;
      changed = true;
      confetti();
      state.logs.unshift(`${new Date().toLocaleString()}: Auto-approved "${c.name}" after ${state.config.autoApproveHours}h`);
    }
  });
  
  if (changed) save();
}

// Payout calculation
function calculatePayout() {
  const approved = state.chores.filter(c => c.status === 'approved').length;
  const rejected = state.chores.filter(c => c.status === 'rejected').length;
  const pending = state.chores.filter(c => c.status === 'pending').length;
  
  const gradeBonus = state.kids.reduce((sum, k) => {
    return sum + (state.config.gradeScale[k.grade] || 0);
  }, 0);
  
  const total = state.config.base + 
                (approved * state.config.rate) + 
                gradeBonus - 
                (rejected * state.config.penalty);
  
  return {
    total: Math.max(0, total),
    approved,
    rejected,
    pending,
    gradeBonus,
    base: state.config.base,
    rate: state.config.rate,
    penalty: state.config.penalty
  };
}

// Add log entry
function addLog(msg, type = 'info') {
  const timestamp = new Date().toLocaleString();
  const entry = `${timestamp}: ${msg}`;
  state.logs.unshift(entry);
  // Keep last 100 logs
  state.logs = state.logs.slice(0, 100);
  save();
}

// Confetti animation
function confetti() {
  const colors = ['#ff4d6d', '#2be9ff', '#f3c969', '#8fff8f'];
  const count = 45;
  
  for (let i = 0; i < count; i++) {
    const confetti = document.createElement('div');
    confetti.className = 'confetti';
    confetti.style.left = (Math.random() * 100) + 'vw';
    confetti.style.background = colors[i % colors.length];
    confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
    confetti.style.animationDuration = (1.4 + Math.random() * 1.6) + 's';
    
    document.body.appendChild(confetti);
    setTimeout(() => confetti.remove(), 2500);
  }
  
  // Add scanline effect
  const scanline = document.createElement('div');
  scanline.className = 'scanline';
  document.body.appendChild(scanline);
  setTimeout(() => scanline.remove(), 3000);
}

// Render chore list with filtering
function renderChores() {
  const list = document.getElementById('choreList');
  const filtered = filterChores(state.chores, currentFilter);
  
  if (filtered.length === 0) {
    list.innerHTML = '<div class="muted" style="text-align:center;padding:20px">No chores found</div>';
    return;
  }
  
  // Sort: pinned first, then by creation date
  const sorted = [...filtered].sort((a, b) => {
    if (b.pinned !== a.pinned) return b.pinned - a.pinned;
    return b.createdAt - a.createdAt;
  });
  
  list.innerHTML = sorted.map(chore => {
    const kid = state.kids.find(k => k.id === chore.kid) || { name: 'Shared' };
    const timeAgo = chore.completedAt ? 
      Math.floor((now() - chore.completedAt) / (60 * 60 * 1000)) + 'h ago' : 
      '';
    
    return `
      <div class="todo ${chore.pinned ? 'pin' : ''} ${chore.autoApproved ? 'glow-border' : ''}" data-id="${chore.id}">
        <button data-action="togglePin" title="${chore.pinned ? 'Unpin' : 'Pin'}">
          ${chore.pinned ? '📌' : '📍'}
        </button>
        <div style="flex:1">
          <div><b>${chore.name}</b> <span class="small muted">(${chore.points} pts • ${kid.emoji || ''} ${kid.name})</span></div>
          <div class="small stat-${chore.status}">
            ${chore.status} ${timeAgo ? `• ${timeAgo}` : ''}
            ${chore.autoApproved ? '• ⚡ Auto' : ''}
          </div>
        </div>
        ${chore.status === 'pending' ? `
          <button data-action="complete">Done</button>
          <button data-action="approve" class="approve-btn">Approve</button>
          <button data-action="reject" class="reject-btn">Reject</button>
        ` : `
          <button data-action="reset">Reset</button>
          <button data-action="delete">Delete</button>
        `}
      </div>
    `;
  }).join('');
}

function filterChores(chores, filter) {
  switch (filter) {
    case 'pending': return chores.filter(c => c.status === 'pending');
    case 'approved': return chores.filter(c => c.status === 'approved');
    case 'rejected': return chores.filter(c => c.status === 'rejected');
    case 'kid1': return chores.filter(c => c.kid === 'kid1');
    case 'kid2': return chores.filter(c => c.kid === 'kid2');
    default: return chores;
  }
}

// Render calculator
function renderCalculator() {
  const kid1 = state.kids.find(k => k.id === 'kid1');
  if (!kid1 || !kid1.calc) return;
  
  const rows = document.getElementById('calcRows');
  const categories = kid1.calc;
  
  rows.innerHTML = Object.entries(categories).map(([name, data]) => {
    const avg = data.scores.length ? 
      (data.scores.reduce((a, b) => a + b, 0) / data.scores.length).toFixed(1) : 
      0;
    const contribution = (avg * data.weight / 100).toFixed(1);
    
    return `
      <div class="card" style="margin-bottom:12px">
        <div class="row" style="justify-content:space-between;margin-bottom:8px">
          <b>${name}</b>
          <span class="small muted">Weight: ${data.weight}%</span>
        </div>
        <div class="small muted" style="margin-bottom:6px">
          Scores: ${data.scores.join(', ')}
        </div>
        <div class="row" style="justify-content:space-between">
          <span class="small">Average: ${avg}%</span>
          <span class="small">Contribution: ${contribution}%</span>
        </div>
      </div>
    `;
  }).join('');
  
  // Calculate weighted grade
  let weighted = 0;
  Object.values(categories).forEach(v => {
    const avg = v.scores.length ? v.scores.reduce((a, b) => a + b, 0) / v.scores.length : 0;
    weighted += avg * (v.weight / 100);
  });
  
  document.getElementById('weightedOut').textContent = weighted.toFixed(1) + '%';
  
  // Determine letter grade
  let letterGrade = 'F';
  if (weighted >= 90) letterGrade = 'A';
  else if (weighted >= 80) letterGrade = 'B';
  else if (weighted >= 70) letterGrade = 'C';
  else if (weighted >= 60) letterGrade = 'D';
  
  document.getElementById('letterGrade').textContent = letterGrade;
  document.getElementById('letterGrade').className = `grade-${letterGrade.toLowerCase()}`;
  
  // Update sparkline
  updateSparkline(kid1.gradeHistory);
  
  // Add to grade history if not already there
  const currentGrade = Number(weighted.toFixed(1));
  if (!kid1.gradeHistory.includes(currentGrade)) {
    kid1.gradeHistory.push(currentGrade);
    kid1.gradeHistory = kid1.gradeHistory.slice(-12); // Keep last 12
    save();
  }
}

function updateSparkline(data) {
  const svg = document.getElementById('spark');
  if (!svg || data.length < 2) return;
  
  const min = Math.min(...data, 60);
  const max = Math.max(...data, 100);
  const width = 340;
  const height = 110;
  const padding = 12;
  
  const points = data.map((value, index) => {
    const x = padding + (index * (width - 2 * padding) / Math.max(1, data.length - 1));
    const y = height - padding - ((value - min) / Math.max(1, max - min)) * (height - 2 * padding);
    return `${x},${y}`;
  }).join(' ');
  
  svg.innerHTML = `
    <rect width="100%" height="100%" fill="#17192a" rx="12" />
    <line x1="${padding}" y1="${height - padding}" x2="${width - padding}" y2="${height - padding}" stroke="#3b3f5c" stroke-width="1" />
    <polyline fill="none" stroke="#2be9ff" stroke-width="3" points="${points}" />
    ${data.map((value, index) => {
      const x = padding + (index * (width - 2 * padding) / Math.max(1, data.length - 1));
      const y = height - padding - ((value - min) / Math.max(1, max - min)) * (height - 2 * padding);
      return `<circle cx="${x}" cy="${y}" r="3" fill="#2be9ff" />`;
    }).join('')}
  `;
}

      pinned: false,
      createdAt: now(),
      completedAt: null,

      recurring: document.getElementById('choreRecurring')?.checked || false
    };

    const chore = state.chores.find(c => c.id === choreId);
    if (!chore) return;
    
    const action = button.dataset.action;
    
    switch (action) {
      case 'togglePin':
        chore.pinned = !chore.pinned;
        addLog(`${chore.pinned ? 'Pinned' : 'Unpinned'} "${chore.name}"`);
        break;
        
      case 'complete':
        chore.completedAt = now();
        chore.status = 'pending';
        addLog(`Completed "${chore.name}"`);
        break;
        
      case 'approve':
      case 'reject':
        pendingPinAction = { action, choreId };
        showPinModal();
        return; // Wait for PIN verification
        
      case 'reset':
        chore.status = 'pending';
        chore.completedAt = null;
        chore.autoApproved = false;
        addLog(`Reset "${chore.name}"`);
        break;
        
      case 'delete':
        if (confirm(`Delete chore "${chore.name}"?`)) {
          state.chores = state.chores.filter(c => c.id !== choreId);
          addLog(`Deleted "${chore.name}"`);
        }
        break;

    render();
  });

    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));

    state.weekStart = getWeekStart();
    // Keep only recurring chores

    addLog(`Manual new week reset (was ${oldWeek})`);
    render();

  // Grade modal

    const rows = document.getElementById('gradeRows');

      <div class="row" style="margin:10px 0;align-items:center">
        <label style="flex:1">${k.name}</label>
        <select data-kid="${k.id}" style="width:100px">
          ${['A', 'B', 'C', 'D', 'F'].map(g => 
            `<option value="${g}" ${k.grade === g ? 'selected' : ''}>${g}</option>`
          ).join('')}
        </select>
        <span class="small muted" style="margin-left:8px">
          ${k.gradeHistory.slice(-1)[0]}% avg

    document.body.classList.toggle('hide-cursor', state.displayMode);

    } else if (document.fullscreenElement) {

      } catch (e) {

      }

    }
    
    if (currentPin !== state.config.parentPin) {

      pinStatus.style.color = 'var(--danger)';
      return;
    }
    
    if (newPin && (newPin.length !== 4 || !/^\d+$/.test(newPin))) {
      pinStatus.textContent = 'New PIN must be 4 digits or empty to remove';
      pinStatus.style.color = 'var(--danger)';
      return;
    }
    
    // Update or remove PIN
    state.config.parentPin = newPin || '1234'; // Default if empty
    save();
    
    pinStatus.textContent = newPin ? 'PIN updated successfully' : 'PIN removed (using default 1234)';
    pinStatus.style.color = 'var(--ok)';
    
    // Clear fields
    document.getElementById('currentPin').value = '';
    document.getElementById('newPin').value = '';
    
    addLog(`Parent PIN ${newPin ? 'updated' : 'removed'}`);
  });
  
  // Export/Import
  document.getElementById('exportBtn').addEventListener('click', exportData);
  document.getElementById('importBtn').addEventListener('click', importData);
  document.getElementById('clearBtn').addEventListener('click', clearData);
  document.getElementById('resetAppBtn').addEventListener('click', resetApp);
  
  // Log buttons
  document.getElementById('clearLogBtn').addEventListener('click', () => {
    if (confirm('Clear logs older than 7 days?')) {
      const weekAgo = now() - (7 * 24 * 60 * 60 * 1000);
      state.logs = state.logs.filter(log => {
        // Simple date parsing - in production use proper parsing
        return log.includes('Auto') || Math.random() > 0.5; // Keep some logs
      });
      addLog('Cleared old logs');
      render();
    }
  });
  
  document.getElementById('exportLogBtn').addEventListener('click', () => {
    const logText = state.logs.join('\n');
    const blob = new Blob([logText], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `famboard-logs-${new Date().toISOString().slice(0,10)}.txt`;
    a.click();
    URL.revokeObjectURL(url);
    addLog('Exported logs');
  });
  
  // PIN gate
  document.getElementById('pinBtn').addEventListener('click', () => {
    const pin = document.getElementById('pinInput').value;
    if (pin === state.config.parentPin) {
      document.querySelector('.controls').classList.remove('interactive');
      document.getElementById('pinInput').value = '';
      addLog('PIN verified - controls unlocked');
    } else {
      alert('Incorrect PIN');
    }
  });
}

// PIN Modal
function showPinModal() {
  const modal = document.getElementById('pinModal');
  const input = document.getElementById('parentPin');
  input.value = '';
  modal.showModal();
  
  document.getElementById('pinCancel').onclick = () => {
    modal.close();
    pendingPinAction = null;
  };
  
  document.getElementById('pinSubmit').onclick = () => {
    const pin = input.value;
    if (pin === state.config.parentPin) {
      executePinAction();
      modal.close();
    } else {
      alert('Incorrect PIN');
      input.value = '';
      input.focus();
    }
  };
}

function executePinAction() {
  if (!pendingPinAction) return;
  
  const { action, choreId } = pendingPinAction;
  const chore = state.chores.find(c => c.id === choreId);
  if (!chore) return;
  
  const oldStatus = chore.status;
  chore.status = action === 'approve' ? 'approved' : 'rejected';
  
  if (action === 'approve') {
    confetti();
  }
  
  addLog(`Parent ${action}ed "${chore.name}" (was ${oldStatus})`);
  pendingPinAction = null;
  render();
}

// Encryption functions
async function deriveKey(passphrase, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    'raw',
    enc.encode(passphrase),
    'PBKDF2',
    false,
    ['deriveKey']
  );
  
  return crypto.subtle.deriveKey(
    {
      name: 'PBKDF2',
      salt,
      iterations: 120000,
      hash: 'SHA-256'
    },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['encrypt', 'decrypt']
  );
}

const b64encode = (buffer) => btoa(String.fromCharCode(...new Uint8Array(buffer)));
const b64decode = (str) => Uint8Array.from(atob(str), c => c.charCodeAt(0));

// Export data
async function exportData() {
  const passphrase = document.getElementById('passphrase').value;
  if (!passphrase) {
    alert('Please enter a passphrase');
    return;
  }
  
  try {
    const salt = crypto.getRandomValues(new Uint8Array(16));
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const key = await deriveKey(passphrase, salt);
    
    const payload = new TextEncoder().encode(JSON.stringify(state));
    const ciphertext = await crypto.subtle.encrypt(
      { name: 'AES-GCM', iv },
      key,
      payload
    );
    
    const exportData = {
      v: 1,
      s: b64encode(salt),
      i: b64encode(iv),
      d: b64encode(ciphertext),
      t: new Date().toISOString()
    };
    
    document.getElementById('blobArea').value = JSON.stringify(exportData, null, 2);
    state.lastExport = now();
    addLog('Exported encrypted data');
    save();
    
  } catch (error) {
    console.error('Export error:', error);
    alert('Export failed: ' + error.message);
  }
}

// Import data
async function importData() {
  const passphrase = document.getElementById('passphrase').value;
  if (!passphrase) {
    alert('Please enter a passphrase');
    return;
  }
  
  try {
    const blobText = document.getElementById('blobArea').value.trim();
    if (!blobText) {
      alert('Please paste encrypted data');
      return;
    }
    
    const importData = JSON.parse(blobText);
    const salt = b64decode(importData.s);
    const iv = b64decode(importData.i);
    const ciphertext = b64decode(importData.d);
    
    const key = await deriveKey(passphrase, salt);
    const plaintext = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv },
      key,
      ciphertext
    );
    
    const importedState = JSON.parse(new TextDecoder().decode(plaintext));
    
    // Validate structure
    if (!importedState.version || !importedState.kids || !Array.isArray(importedState.kids)) {
      throw new Error('Invalid data format');
    }
    
    // Merge with current config
    state = { ...state, ...importedState };
    save();
    addLog(`Imported data from ${importData.t || 'unknown date'}`);
    render();
    
    alert('Import successful!');
    
  } catch (error) {
    console.error('Import error:', error);
    alert('Import failed: ' + error.message);
  }
}

// Update mini sparkline
function updateMiniSparkline() {
  const kid1 = state.kids.find(k => k.id === 'kid1');
  if (!kid1) return;
  
  const svg = document.getElementById('miniSpark');
  const data = kid1.gradeHistory.slice(-8); // Last 8 grades
  if (data.length < 2) return;
  
  const width = 300;
  const height = 60;
  const min = Math.min(...data, 60);
  const max = Math.max(...data, 100);
  
  const points = data.map((value, index) => {
    const x = (index * width) / Math.max(1, data.length - 1);
    const y = height - ((value - min) / Math.max(1, max - min)) * (height - 10);
    return `${x},${y}`;
  }).join(' ');
  
  svg.innerHTML = `
    <polyline fill="none" stroke="#2be9ff" stroke-width="2" points="${points}" />
  `;
  svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
}

// Clock
function startClock() {
  function updateClock() {
    const now = new Date();
    const timeString = now.toLocaleTimeString('en-US', { 
      hour12: true, 
      hour: '2-digit', 
      minute: '2-digit',
      second: '2-digit'
    });
    const dateString = now.toLocaleDateString('en-US', {
      weekday: 'short',
      month: 'short',
      day: 'numeric'
    });
    document.getElementById('clock').textContent = `${dateString} ${timeString}`;
  }
  
  updateClock();
  setInterval(updateClock, 1000);
}

// Service Worker
function setupServiceWorker() {
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => {
          console.log('Service Worker registered:', reg);
          // Check for updates
          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                addLog('App update available. Refresh to update.');
              }
            });
          });
        })
        .catch(err => console.error('Service Worker registration failed:', err));
    });
    
    // Listen for messages from service worker
    navigator.serviceWorker.addEventListener('message', event => {
      if (event.data && event.data.type === 'CACHE_UPDATED') {
        addLog('App cache updated');
      }
    });
  }
}
